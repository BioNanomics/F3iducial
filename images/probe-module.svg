<svg viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg" font-family="monospace, sans-serif">
  <!-- Background -->
  <rect width="700" height="460" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" fill="white" font-size="18" font-weight="bold">Probe Module</text>
  <text x="350" y="46" text-anchor="middle" fill="#90a4ae" font-size="11">Fixed horizontal probe with Z-only lift · camera mounted below, angled upward</text>

  <!-- Quick-mount bracket -->
  <rect x="80" y="100" width="30" height="240" fill="#2e4a6e" stroke="#4fc3f7" stroke-width="2" rx="3"/>
  <circle cx="95" cy="120" r="5" fill="#4fc3f7" opacity="0.7"/>
  <circle cx="95" cy="150" r="5" fill="#4fc3f7" opacity="0.7"/>
  <circle cx="95" cy="300" r="5" fill="#4fc3f7" opacity="0.7"/>
  <circle cx="95" cy="330" r="5" fill="#4fc3f7" opacity="0.7"/>

  <!-- Worm-gear lift column (Z axis) -->
  <rect x="110" y="80" width="40" height="280" fill="#1e3a5f" stroke="#4fc3f7" stroke-width="1.5" rx="2"/>
  <!-- Gear rack markings -->
  <g stroke="#3d7abf" stroke-width="1.5">
    <line x1="114" y1="100" x2="146" y2="100"/>
    <line x1="114" y1="115" x2="146" y2="115"/>
    <line x1="114" y1="130" x2="146" y2="130"/>
    <line x1="114" y1="145" x2="146" y2="145"/>
    <line x1="114" y1="160" x2="146" y2="160"/>
    <line x1="114" y1="175" x2="146" y2="175"/>
    <line x1="114" y1="190" x2="146" y2="190"/>
    <line x1="114" y1="205" x2="146" y2="205"/>
    <line x1="114" y1="220" x2="146" y2="220"/>
    <line x1="114" y1="235" x2="146" y2="235"/>
    <line x1="114" y1="250" x2="146" y2="250"/>
    <line x1="114" y1="265" x2="146" y2="265"/>
    <line x1="114" y1="280" x2="146" y2="280"/>
    <line x1="114" y1="295" x2="146" y2="295"/>
    <line x1="114" y1="310" x2="146" y2="310"/>
    <line x1="114" y1="325" x2="146" y2="325"/>
    <line x1="114" y1="340" x2="146" y2="340"/>
  </g>

  <!-- Z-axis arrow -->
  <line x1="160" y1="90" x2="160" y2="350" stroke="#80cbc4" stroke-width="1.5"/>
  <polygon points="160,80 156,94 164,94" fill="#80cbc4"/>
  <polygon points="160,360 156,346 164,346" fill="#80cbc4"/>
  <text x="167" y="220" fill="#80cbc4" font-size="11">Z</text>

  <!-- Carriage block (slides on column) -->
  <rect x="108" y="200" width="44" height="36" fill="#37474f" stroke="#78909c" stroke-width="1.5" rx="2"/>

  <!-- Horizontal probe arm (fixed) -->
  <rect x="152" y="208" width="240" height="20" fill="#1e3a5f" stroke="#4fc3f7" stroke-width="1.5" rx="2"/>

  <!-- Soft probe tip at the END of the arm -->
  <ellipse cx="404" cy="218" rx="14" ry="11" fill="#ff8f00" stroke="#ffa726" stroke-width="1.5"/>

  <!-- Camera mounted BELOW the arm, tilted upward (rotated -20deg). -->
  <g transform="rotate(-20 360 270)">
    <rect x="332" y="252" width="56" height="36" fill="#263238" stroke="#80cbc4" stroke-width="2" rx="4"/>
    <circle cx="360" cy="270" r="12" fill="#004d40" stroke="#80cbc4" stroke-width="1.5"/>
    <circle cx="360" cy="270" r="5" fill="#26a69a"/>
    <line x1="332" y1="252" x2="332" y2="288" stroke="#b2dfdb" stroke-width="1.5"/>
  </g>

  <!-- Camera mounting struts from arm down to camera body -->
  <line x1="370" y1="228" x2="370" y2="252" stroke="#546e7a" stroke-width="3"/>
  <line x1="345" y1="228" x2="345" y2="252" stroke="#546e7a" stroke-width="3"/>

  <!-- Upward field-of-view cone from camera (illustrative) -->
  <polygon points="360,255 240,160 250,150 365,250" fill="#80cbc4" opacity="0.10"/>
  <polygon points="360,255 480,160 470,150 365,250" fill="#80cbc4" opacity="0.10"/>
  <line x1="360" y1="255" x2="248" y2="155" stroke="#80cbc4" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
  <line x1="360" y1="255" x2="472" y2="155" stroke="#80cbc4" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
  <text x="298" y="138" fill="#80cbc4" font-size="10" opacity="0.85">camera FOV (looks up)</text>

  <!-- Example AprilTag in view, above the probe tip -->
  <g>
    <rect x="478" y="178" width="56" height="56" fill="#eceff1" stroke="#cfd8dc" stroke-width="1"/>
    <rect x="484" y="184" width="44" height="44" fill="#0d1b2a"/>
    <rect x="490" y="190" width="8" height="8" fill="#eceff1"/>
    <rect x="514" y="190" width="8" height="8" fill="#eceff1"/>
    <rect x="502" y="202" width="8" height="8" fill="#eceff1"/>
    <rect x="490" y="214" width="8" height="8" fill="#eceff1"/>
    <rect x="514" y="214" width="8" height="8" fill="#eceff1"/>
    <text x="506" y="252" text-anchor="middle" fill="#cfd8dc" font-size="10">AprilTag</text>
  </g>

  <!-- Probe approach arrow -->
  <line x1="430" y1="218" x2="470" y2="218" stroke="#ffab40" stroke-width="2"/>
  <polygon points="470,218 462,214 462,222" fill="#ffab40"/>
  <text x="430" y="208" fill="#ffab40" font-size="10">chassis drives in →</text>

  <!-- Tag-center Z range bracket alongside the column -->
  <g stroke="#b39ddb" stroke-width="1.5" fill="none">
    <line x1="60" y1="100" x2="60" y2="340"/>
    <line x1="55" y1="100" x2="65" y2="100"/>
    <line x1="55" y1="340" x2="65" y2="340"/>
  </g>
  <text x="48" y="105" text-anchor="end" fill="#b39ddb" font-size="10">Z max ≈ 1.90 m</text>
  <text x="48" y="335" text-anchor="end" fill="#b39ddb" font-size="10">Z min ≈ 0.20 m</text>
  <text x="48" y="225" text-anchor="end" fill="#b39ddb" font-size="10">(covers 2023–2026</text>
  <text x="48" y="238" text-anchor="end" fill="#b39ddb" font-size="10">FRC tag centers)</text>

  <!-- Labels / leader lines -->
  <line x1="80" y1="220" x2="40" y2="380" stroke="#4fc3f7" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="38" y="395" text-anchor="start" fill="white" font-size="11">Quick-Mount Bracket</text>

  <line x1="130" y1="80" x2="170" y2="55" stroke="#4fc3f7" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="173" y="52" fill="white" font-size="11">Worm-Gear Lift (Z only)</text>
  <text x="173" y="65" fill="#90a4ae" font-size="10">non-backdrivable; carries probe + camera</text>

  <line x1="280" y1="208" x2="280" y2="175" stroke="#90a4ae" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="280" y="170" text-anchor="middle" fill="white" font-size="11">Fixed Horizontal Probe Arm</text>
  <text x="280" y="183" text-anchor="middle" fill="#90a4ae" font-size="10">no extend / retract / articulate</text>

  <line x1="418" y1="218" x2="455" y2="278" stroke="#ff8f00" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="458" y="282" fill="white" font-size="11">Interchangeable Probe Tip</text>
  <text x="458" y="295" fill="#90a4ae" font-size="10">contacts mounting surface below tag</text>

  <line x1="360" y1="285" x2="425" y2="345" stroke="#80cbc4" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="428" y="349" fill="white" font-size="11">Localization Camera</text>
  <text x="428" y="362" fill="#80cbc4" font-size="10">below arm · pitched +15°–25° up</text>
  <text x="428" y="375" fill="#80cbc4" font-size="10">sees tag through approach &amp; contact</text>

  <!-- Module ID box -->
  <rect x="550" y="380" width="130" height="60" fill="#0d1b2a" stroke="#546e7a" stroke-width="1" rx="3"/>
  <text x="615" y="397" text-anchor="middle" fill="#90a4ae" font-size="10">MODULE ID</text>
  <text x="615" y="412" text-anchor="middle" fill="#4fc3f7" font-size="10">probe-v1.0</text>
  <text x="615" y="425" text-anchor="middle" fill="#607d8b" font-size="9">HW REV A</text>
  <text x="615" y="437" text-anchor="middle" fill="#607d8b" font-size="9">Z range + cam extrinsics</text>

  <!-- Footer note -->
  <text x="350" y="455" text-anchor="middle" fill="#607d8b" font-size="10">Contact is made by driving the chassis, not by moving the probe. The probe never retracts on error — the robot stops and reports.</text>
</svg>
