<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="monospace, sans-serif">
  <!-- Background -->
  <rect width="800" height="450" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="white" font-size="18" font-weight="bold">F3iducial — Field Diagram</text>

  <!-- Field boundary walls -->
  <rect x="60" y="60" width="680" height="340" fill="none" stroke="#5c5c8a" stroke-width="6" rx="4"/>

  <!-- Field interior surface -->
  <rect x="66" y="66" width="668" height="328" fill="#16213e" opacity="0.7"/>

  <!-- Center line (dashed) -->
  <line x1="400" y1="66" x2="400" y2="394" stroke="#2a2a5a" stroke-width="1.5" stroke-dasharray="8,6"/>
  <line x1="60" y1="230" x2="740" y2="230" stroke="#2a2a5a" stroke-width="1.5" stroke-dasharray="8,6"/>

  <!-- AprilTag markers — top wall -->
  <g fill="#4fc3f7" stroke="#0288d1" stroke-width="1.5">
    <rect x="160" y="64" width="28" height="22" rx="2"/>
    <text x="174" y="78" text-anchor="middle" fill="white" font-size="9" font-weight="bold">1</text>

    <rect x="386" y="64" width="28" height="22" rx="2"/>
    <text x="400" y="78" text-anchor="middle" fill="white" font-size="9" font-weight="bold">2</text>

    <rect x="612" y="64" width="28" height="22" rx="2"/>
    <text x="626" y="78" text-anchor="middle" fill="white" font-size="9" font-weight="bold">3</text>
  </g>

  <!-- AprilTag markers — bottom wall -->
  <g fill="#4fc3f7" stroke="#0288d1" stroke-width="1.5">
    <rect x="160" y="364" width="28" height="22" rx="2"/>
    <text x="174" y="378" text-anchor="middle" fill="white" font-size="9" font-weight="bold">6</text>

    <rect x="386" y="364" width="28" height="22" rx="2"/>
    <text x="400" y="378" text-anchor="middle" fill="white" font-size="9" font-weight="bold">5</text>

    <rect x="612" y="364" width="28" height="22" rx="2"/>
    <text x="626" y="378" text-anchor="middle" fill="white" font-size="9" font-weight="bold">4</text>
  </g>

  <!-- AprilTag markers — left wall -->
  <g fill="#4fc3f7" stroke="#0288d1" stroke-width="1.5">
    <rect x="60" y="150" width="22" height="28" rx="2"/>
    <text x="71" y="167" text-anchor="middle" fill="white" font-size="9" font-weight="bold">7</text>

    <rect x="60" y="216" width="22" height="28" rx="2"/>
    <text x="71" y="233" text-anchor="middle" fill="white" font-size="9" font-weight="bold">8</text>
  </g>

  <!-- AprilTag markers — right wall -->
  <g fill="#4fc3f7" stroke="#0288d1" stroke-width="1.5">
    <rect x="718" y="150" width="22" height="28" rx="2"/>
    <text x="729" y="167" text-anchor="middle" fill="white" font-size="9" font-weight="bold">9</text>

    <rect x="718" y="216" width="22" height="28" rx="2"/>
    <text x="729" y="233" text-anchor="middle" fill="white" font-size="9" font-weight="bold">10</text>
  </g>

  <!-- Robot body -->
  <rect x="250" y="300" width="36" height="36" fill="#e65100" stroke="#ff8f00" stroke-width="2" rx="3"/>
  <!-- Robot direction indicator -->
  <polygon points="268,296 262,306 274,306" fill="#ff8f00"/>

  <!-- Navigation path arc -->
  <path d="M268 318 Q320 260 400 230 Q480 200 520 155" fill="none" stroke="#ff8f00" stroke-width="2.5" stroke-dasharray="10,5" opacity="0.85"/>
  <!-- Arrow at end of path -->
  <polygon points="520,147 514,160 526,160" fill="#ff8f00" transform="rotate(-30,520,155)"/>

  <!-- Target inspection point -->
  <circle cx="520" cy="155" r="8" fill="none" stroke="#4fc3f7" stroke-width="2"/>
  <circle cx="520" cy="155" r="3" fill="#4fc3f7"/>

  <!-- Legend -->
  <rect x="66" y="404" width="668" height="36" fill="#0d0d24" rx="3"/>
  <rect x="80" y="415" width="14" height="14" fill="#4fc3f7" rx="1"/>
  <text x="100" y="426" fill="#4fc3f7" font-size="11">AprilTag</text>
  <rect x="190" y="415" width="14" height="14" fill="#e65100" rx="1"/>
  <text x="210" y="426" fill="#ff8f00" font-size="11">Robot</text>
  <line x1="290" y1="422" x2="320" y2="422" stroke="#ff8f00" stroke-width="2.5" stroke-dasharray="6,4"/>
  <text x="328" y="426" fill="#ff8f00" font-size="11">Navigation Path</text>
  <circle cx="475" cy="422" r="5" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <circle cx="475" cy="422" r="2" fill="#4fc3f7"/>
  <text x="486" y="426" fill="#4fc3f7" font-size="11">Inspection Point</text>
</svg>
