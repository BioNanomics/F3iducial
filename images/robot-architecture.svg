<svg viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg" font-family="monospace, sans-serif">
  <!-- Background -->
  <rect width="700" height="400" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" fill="white" font-size="18" font-weight="bold">Robot Architecture</text>

  <!-- Main chassis body -->
  <rect x="180" y="140" width="280" height="140" fill="#1e3a5f" stroke="#4fc3f7" stroke-width="2" rx="5"/>
  <text x="320" y="215" text-anchor="middle" fill="#90caf9" font-size="13" font-weight="bold">Chassis</text>
  <text x="320" y="232" text-anchor="middle" fill="#607d8b" font-size="10">Swerve Drive Platform</text>

  <!-- IMU inside chassis -->
  <rect x="285" y="245" width="70" height="22" fill="#263238" stroke="#78909c" stroke-width="1" rx="3"/>
  <text x="320" y="260" text-anchor="middle" fill="#b0bec5" font-size="9">IMU / Pigeon2</text>

  <!-- Companion compute -->
  <rect x="215" y="245" width="60" height="22" fill="#263238" stroke="#78909c" stroke-width="1" rx="3"/>
  <text x="245" y="260" text-anchor="middle" fill="#b0bec5" font-size="9">Companion</text>

  <!-- Swerve wheels — 4 corners -->
  <!-- Front-left -->
  <ellipse cx="200" cy="148" rx="22" ry="14" fill="#37474f" stroke="#607d8b" stroke-width="2"/>
  <text x="200" y="152" text-anchor="middle" fill="#90caf9" font-size="8">SW</text>
  <!-- Front-right -->
  <ellipse cx="440" cy="148" rx="22" ry="14" fill="#37474f" stroke="#607d8b" stroke-width="2"/>
  <text x="440" y="152" text-anchor="middle" fill="#90caf9" font-size="8">SW</text>
  <!-- Rear-left -->
  <ellipse cx="200" cy="272" rx="22" ry="14" fill="#37474f" stroke="#607d8b" stroke-width="2"/>
  <text x="200" y="276" text-anchor="middle" fill="#90caf9" font-size="8">SW</text>
  <!-- Rear-right -->
  <ellipse cx="440" cy="272" rx="22" ry="14" fill="#37474f" stroke="#607d8b" stroke-width="2"/>
  <text x="440" y="276" text-anchor="middle" fill="#90caf9" font-size="8">SW</text>

  <!-- Probe arm assembly — extends from front of chassis -->
  <!-- Quick-mount bracket -->
  <rect x="458" y="168" width="18" height="84" fill="#2e4a6e" stroke="#4fc3f7" stroke-width="1.5" rx="2"/>
  <!-- Horizontal arm -->
  <rect x="476" y="195" width="80" height="16" fill="#1e3a5f" stroke="#4fc3f7" stroke-width="1.5" rx="2"/>
  <!-- Camera box -->
  <rect x="536" y="183" width="28" height="28" fill="#263238" stroke="#80cbc4" stroke-width="1.5" rx="3"/>
  <circle cx="550" cy="197" r="7" fill="#004d40" stroke="#80cbc4" stroke-width="1"/>
  <circle cx="550" cy="197" r="3" fill="#26a69a"/>
  <!-- Probe tip -->
  <rect x="556" y="199" width="28" height="8" fill="#546e7a" stroke="#90a4ae" stroke-width="1" rx="1"/>
  <polygon points="584,199 592,203 584,207" fill="#ff8f00"/>

  <!-- Safety whisker bar -->
  <rect x="458" y="163" width="140" height="6" fill="#b71c1c" stroke="#e53935" stroke-width="1" rx="2"/>

  <!-- Callout lines and labels -->
  <!-- Swerve module label -->
  <line x1="200" y1="134" x2="200" y2="90" stroke="#607d8b" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="200" y1="90" x2="120" y2="90" stroke="#607d8b" stroke-width="1"/>
  <text x="115" y="87" text-anchor="end" fill="white" font-size="11">Swerve Module (×4)</text>

  <!-- Chassis label -->
  <line x1="320" y1="140" x2="320" y2="90" stroke="#4fc3f7" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="320" y="84" text-anchor="middle" fill="white" font-size="11">Main Chassis</text>

  <!-- Quick-mount label -->
  <line x1="467" y1="168" x2="510" y2="115" stroke="#4fc3f7" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="515" y="112" fill="white" font-size="11">Quick-Mount</text>

  <!-- Camera label -->
  <line x1="550" y1="183" x2="580" y2="130" stroke="#80cbc4" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="583" y="127" fill="white" font-size="11">Camera</text>

  <!-- Probe tip label -->
  <line x1="580" y1="203" x2="630" y2="235" stroke="#ff8f00" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="633" y="238" fill="white" font-size="11">Probe Tip</text>

  <!-- Whisker label -->
  <line x1="530" y1="163" x2="570" y2="145" stroke="#e53935" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="573" y="143" fill="white" font-size="11">Safety Whisker Bar</text>

  <!-- IMU label -->
  <line x1="320" y1="267" x2="360" y2="310" stroke="#78909c" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="363" y="313" fill="white" font-size="11">IMU</text>

  <!-- Companion label -->
  <line x1="245" y1="267" x2="200" y2="310" stroke="#78909c" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="115" y="313" text-anchor="middle" fill="white" font-size="11">Companion Compute</text>

  <!-- Direction arrow -->
  <text x="595" y="210" fill="#ff8f00" font-size="12">→ FRONT</text>
</svg>
